<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-amber-950 h-10 w-full border-2 rounded-md my-10 p-2 flex justify-center items-center">
        <h2 class="text-center font-mono font-extrabold  text-cyan-50 mt-2">Udenwa new world!</h2>
    </div>

    <div class=" flex justify-evenly items-center space-x-6 mt-2 border-2 border-amber-600 rounded-md mx-2">
        <div class="h-16 w-16 rounded-full bg-blue-800"></div>
        <div class="h-16 w-16 rounded-full bg-orange-800"></div>
        <div class="h-16 w-16 rounded-full bg-green-800"></div>
        <div class="h-16 w-16 rounded-full bg-blue-800"></div>
    </div>

    <div class=" grid grid-cols-5 space-x-6 gap-2 mt-2 mx-2">
        <div class="h-16 rounded-full bg-blue-800"></div>
        <div class="h-16 rounded-full bg-orange-800"></div>
        <div class="h-16 rounded-full bg-green-800"></div>
        <div class="h-16 rounded-full bg-blue-800"></div>
    </div>

    <div class="md:block hidden">
        <p class="text-amber-500">This is a simple paragraph.</p>
    </div>

    <div class="sm:bg-amber-500 md:bg-amber-700 lg:bg-amber-900">
        <p class="text-amber-500">This is a simple paragraph.</p>
    </div>

    <div class="dark:bg-black dark:text-white">
        <p>Dark mode enabled</p>
    </div>

    <div class="bg-white dark:bg-gray-900">
        <p class="text-black dark:text-white">Hello</p>
    </div>
</body>
</html>
